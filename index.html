<style>
:root {
  /* TradingView Deep Slate Theming */
  --bg-base: #0B0E14; 
  --bg-chart: #131722; 
  --bg-panel: #1E222D; 
  --bg-input: #2A2E39; 
  
  --border-main: #2A2E39;
  --border-light: #363C4E;
  --border-active: #2962FF; 
  
  --text-main: #D1D4DC;
  --text-muted: #787B86;
  
  /* Custom Visuals */
  --buy-color: #E6C35C; 
  --sell-color: #26A69A; 
  --iqr-band: rgba(120, 123, 134, 0.08); 
  --vol-buy: rgba(230, 195, 92, 0.35);
  --vol-sell: rgba(38, 166, 154, 0.35);
  
  --positive: #26A69A;
  --negative: #EF5350;
  --shadow: rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body { 
  margin: 0; 
  background: var(--bg-base); 
  color: var(--text-main); 
  font-family: -apple-system, BlinkMacSystemFont, 'Trebuchet MS', Roboto, Ubuntu, sans-serif; 
  -webkit-font-smoothing: antialiased; 
  overflow: hidden; 
}

/* PORTRAIT LOCK OVERLAY */
.portrait-lock { display: none; }
@media screen and (max-width: 768px) and (orientation: portrait) {
  .wrap { display: none !important; }
  .portrait-lock {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; background: var(--bg-base); color: var(--text-main); text-align: center; padding: 20px;
  }
  .portrait-lock svg { 
    width: 60px; height: 60px; margin-bottom: 20px; color: var(--border-active);
    animation: rotatePhone 2s infinite ease-in-out; 
  }
  .portrait-lock h2 { margin: 0 0 10px 0; font-size: 20px; }
  .portrait-lock p { margin: 0; color: var(--text-muted); font-size: 14px; }
  @keyframes rotatePhone { 
    0% { transform: rotate(0deg); } 
    50% { transform: rotate(-90deg); } 
    100% { transform: rotate(-90deg); } 
  }
}

.wrap { 
  max-width: 1600px; 
  margin: 0 auto; 
  padding: 8px; 
  height: 100vh; 
  display: flex; 
  flex-direction: column; 
  gap: 8px; 
}

/* Premium Compact Header Panel */
.top-panel {
  background: var(--bg-panel); border: 1px solid var(--border-main); border-radius: 6px;
  padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}

.panel-left { display: flex; align-items: center; gap: 10px; }

.brand {
  font-size: 15px; font-weight: 800; color: var(--text-main); cursor: pointer;
  letter-spacing: -0.5px; display: flex; align-items: center; gap: 2px;
}
.brand span { color: var(--border-active); }

/* Shrunk Search Bar */
.sbar { position: relative; width: 200px; }
.sbar input {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border-light);
  color: var(--text-main); border-radius: 4px; padding: 5px 8px 5px 28px;
  font-size: 16px; outline: none; transition: border-color 0.15s ease;
}
.sbar input:focus { border-color: var(--border-active); }
#itemIcon { position: absolute; left: 6px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; image-rendering: pixelated; }

/* Autocomplete Suggestion Dropdown */
.suggest { 
  margin-top: 4px; border: 1px solid var(--border-light); border-radius: 4px; 
  max-height: 200px; overflow-y: auto; background: var(--bg-panel); 
  position: absolute; z-index: 100; width: 260px; box-shadow: 0 8px 16px var(--shadow); 
}
.suggest::-webkit-scrollbar { width: 4px; background: var(--bg-panel); }
.suggest::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
.suggest div { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--border-main); cursor: pointer; font-size: 13px; }
.suggest div:last-child { border-bottom: none; }
.suggest div:hover { background: var(--bg-input); color: #fff; }
.suggest img { width: 16px; height: 16px; image-rendering: pixelated; }

/* Timeframe Selection - Updated for % display */
.toolbar { display: flex; background: var(--bg-input); border-radius: 4px; padding: 2px; gap: 2px; }
.toolbar button {
  background: transparent; border: none; color: var(--text-muted); border-radius: 3px;
  padding: 2px 6px; cursor: pointer; font-weight: 600; font-size: 11px; transition: all 0.15s;
  display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 45px;
}
.toolbar button:hover { color: var(--text-main); }
.toolbar button.active { background: var(--border-light); color: #fff; }
.pct-chg { font-size: 9px; font-weight: normal; margin-top: 1px; }
.pct-chg.positive { color: var(--positive); }
.pct-chg.negative { color: var(--negative); }
.pct-chg.neutral { color: var(--text-muted); }

/* Game Toggles */
.mode-pill { display: flex; background: var(--bg-input); border-radius: 4px; padding: 2px; }
.mode-pill button {
  background: transparent; border: none; color: var(--text-muted); padding: 4px 8px;
  cursor: pointer; font-weight: 600; font-size: 11px; border-radius: 3px;
}
.mode-pill button.active { background: var(--border-active); color: #fff; }

.status-text { font-size: 11px; color: var(--text-muted); }

/* Main Chart & Watchlist Panel Layout */
.content-area { display: flex; flex: 1; gap: 8px; min-height: 0; }

.chart-container {
  flex: 1; background: var(--bg-chart); border: 1px solid var(--border-main);
  border-radius: 6px; display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.chart { flex: 1; width: 100%; display: block; }

/* Target Info Plaques */
.plaque-bar { position: absolute; top: 8px; left: 8px; display: flex; gap: 6px; z-index: 10; pointer-events: none; }
.price-box {
  background: rgba(30, 34, 45, 0.85); border: 1px solid var(--border-light); border-radius: 4px;
  padding: 4px 8px; min-width: 100px; pointer-events: auto; cursor: pointer; backdrop-filter: blur(4px); transition: border-color 0.15s;
}
.price-box.selected { border-color: #fff; background: rgba(42, 46, 57, 0.95); }
.price-label { font-size: 9px; color: var(--text-muted); font-weight: bold; text-transform: uppercase; }
.price-box.low .price-val { color: var(--buy-color); }
.price-box.high .price-val { color: var(--sell-color); }
.price-val { font-size: 13px; font-weight: bold; margin-top: 1px; }

/* Legend Sub-Footer */
.chart-footer {
  background: var(--bg-panel); border-top: 1px solid var(--border-main); padding: 4px 10px;
  display: flex; gap: 12px; font-size: 10px; color: var(--text-muted); align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dash { width: 10px; height: 2px; display: inline-block; }
.legend-box { width: 8px; height: 8px; display: inline-block; border-radius: 2px; }
.legend .low .legend-dash { background: var(--buy-color); }
.legend .high .legend-dash { background: var(--sell-color); }
.legend .iqr-band .legend-box { background: rgba(120, 123, 134, 0.2); border: 1px solid var(--border-light); }

/* Dynamic Tooltip */
.chart-tip { 
  position: absolute; display: none; background: rgba(19, 23, 34, 0.95); color: var(--text-main); 
  padding: 8px; border-radius: 4px; font-size: 10px; pointer-events: none; white-space: nowrap; 
  border: 1px solid var(--border-light); box-shadow: 0 4px 12px var(--shadow); z-index: 50; 
}
.chart-tip strong { display: block; margin-bottom: 3px; color: #fff; border-bottom: 1px solid var(--border-main); padding-bottom: 3px;}

/* --- WATCHLIST SIDEBAR STYLING --- */
.watchlist-container {
  width: 280px; background: var(--bg-panel); border: 1px solid var(--border-main);
  border-radius: 6px; display: flex; flex-direction: column; overflow: hidden;
}
.watchlist-header {
  padding: 8px 10px; background: var(--bg-input); border-bottom: 1px solid var(--border-main);
  font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.watchlist-content { flex: 1; overflow-y: auto; }
.watchlist-content::-webkit-scrollbar { width: 4px; background: var(--bg-panel); }
.watchlist-content::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

.category-group { border-bottom: 1px solid var(--border-main); }
.category-title {
  padding: 6px 10px; font-size: 10px; font-weight: bold; color: var(--border-active);
  background: rgba(42, 46, 57, 0.4); cursor: pointer; display: flex; justify-content: space-between;
}
.category-title:hover { background: var(--bg-input); }
.category-list { display: block; }
.category-list.collapsed { display: none; }

.wl-item {
  display: flex; align-items: center; justify-content: space-between; padding: 6px 10px;
  cursor: pointer; font-size: 12px; border-bottom: 1px solid rgba(42, 46, 57, 0.3);
}
.wl-item:last-child { border-bottom: none; }
.wl-item:hover { background: var(--bg-input); }
.wl-item.active { background: rgba(41, 98, 255, 0.15); border-left: 2px solid var(--border-active); }
.wl-item-left { display: flex; align-items: center; gap: 6px; overflow: hidden; }
.wl-item-left img { width: 16px; height: 16px; image-rendering: pixelated; flex-shrink: 0; }
.wl-item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wl-item-right { display: flex; align-items: center; gap: 4px; }
.wl-item-price { font-weight: 600; font-size: 11px; color: var(--text-main); }
.wl-trend { font-size: 9px; }
.wl-trend.up { color: var(--positive); }
.wl-trend.down { color: var(--negative); }

/* TARGETED MOBILE LANDSCAPE OPTIMIZATIONS */
@media (max-height: 500px) and (orientation: landscape) {
  .wrap { padding: 4px; gap: 4px; }
  .top-panel { padding: 3px 6px; }
  .sbar { width: 160px; }
  .sbar input { padding-top: 3px; padding-bottom: 3px; }
  .status-text { display: none; }
  .brand { font-size: 13px; }
  .plaque-bar { top: 4px; left: 4px; }
  .chart-footer { padding: 2px 8px; }
  .watchlist-container { width: 220px; font-size: 11px; }
  .wl-item { padding: 4px 6px; font-size: 11px; }
}

/* Fallback if user bypasses orientation lock on slightly larger tablets */
@media (max-width: 768px) {
  .sbar { width: 140px; }
  .watchlist-container { width: 100%; height: 200px; flex: none; }
}
</style>

<body>

<div class="portrait-lock">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
    <line x1="12" y1="18" x2="12.01" y2="18"></line>
  </svg>
  <h2>Please Rotate Device</h2>

</div>

<div class="wrap">
  
  <div class="top-panel">
    <div class="panel-left">
      <div class="brand" onclick="location.reload();">GE<span>Chart</span></div>
      
      <div class="sbar">

      <div class="toolbar" id="timeToolbar">

    <div class="panel-left">

  <div class="content-area">
    <div class="chart-container">
      
      <div class="plaque-bar">
        <div id="buyPrice" class="price-box low selected">
          <div class="price-label">Rec. Buy</div>
          <div class="price-val"><span>—</span></div>

          <div class="price-label">Rec. Sell</div>
          <div class="price-val"><span>—</span></div>
        </div>
      </div>

      <canvas id="chart" class="chart"></canvas>
      <div id="tip" class="chart-tip"></div>
      
      <div class="chart-footer legend">
        <div class="legend-item low"><span class="legend-dash"></span> Lows</div>
        <div class="legend-item high"><span class="legend-dash"></span> Highs</div>
        <div class="legend-item iqr-band"><span class="legend-box"></span> Band</div>
        <div class="legend-item"><span class="legend-dash" style="background:var(--text-muted); border-top: 1px dashed #fff;"></span> Trajectory</div>
      </div>
    </div>

    <div class="watchlist-container">
      <div class="watchlist-header">
        <span>Market Watchlist</span>
        <span id="wlCount" style="font-weight:normal; font-size:10px;">Loading...</span>
      </div>
      <div class="watchlist-content" id="watchlistContent">
        </div>

</div>
<script>
const $ = s => document.querySelector(s);
const PRICES_API = "https://prices.runescape.wiki/api/v1/osrs";
const WEIRD_GLOOP_API = "https://api.weirdgloop.org/exchange/history/osrs";
let mapping = [], latest = null, past24h = null, selected = null;
let currentSeries = null, view = "1d", zoom = 1.0, offset = 0;
let membersOn = false;
let fullHistorical = null;

let activePriceBox = 'buy'; 
let recommendedBuy = null, recommendedSell = null;

const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
const tip = document.getElementById("tip");

$('#buyPrice').onclick = () => { activePriceBox = 'buy'; updateSelection(); if(currentSeries) drawChart(currentSeries); };
$('#sellPrice').onclick = () => { activePriceBox = 'sell'; updateSelection(); if(currentSeries) drawChart(currentSeries); };
function updateSelection() {
  $('#buyPrice').classList.toggle('selected', activePriceBox === 'buy');
  $('#sellPrice').classList.toggle('selected', activePriceBox === 'sell');
}

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height - 24;
  if(currentSeries) drawChart(currentSeries);
}
window.addEventListener('resize', resizeCanvas);

const fmtGp = n => n == null ? "—" : Number(n).toLocaleString();
const fmtNum = n => n == null ? "—" : Number(n).toLocaleString();
const abbreviateNumber = (num) => {
  if (num >= 1e9) return (num / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
  if (num >= 1e6) return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (num >= 1e3) return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
  return num.toLocaleString();
};

async function jget(url) {
  const r = await fetch(url, { cache: "default" });
  if (!r.ok) throw new Error(url + " HTTP " + r.status);
  return await r.json();
}
const loadMapping = () => jget(PRICES_API + "/mapping");
const loadLatest = () => jget(PRICES_API + "/latest");
const load24h = () => jget(PRICES_API + "/24h"); // Baseline for trend arrows
const loadTS = (step, id) => jget(PRICES_API + `/timeseries?timestep=${step}&id=${id}`);
const loadHistorical = (id) => jget(WEIRD_GLOOP_API + `/all?id=${id}`);

function bigIconUrl(name) {
  return `https://oldschool.runescape.wiki/images/${encodeURIComponent(name.replace(/ /g, '_'))}.png`;
}

// --- MASSIVE ITEM CLASSIFIER ENGINE ---
function classifyItem(name) {
  const n = name.toLowerCase();
  if (/(sword|whip|rapier|fang|dagger|mace|scimitar|halberd|spear|hasta|claws|axe|bow|arrow|dart|knife|javelin|bolt|chinchompa|blowpipe|staff|wand|trident|bludgeon)/.test(n)) return "Weapons & Ammo";
  if (/(helm|plate|shield|legs|skirt|chainbody|hide|tassets|cuirass|faceguard|boots|gloves|defender|ahrim|karil|dharok|torag|guthan|verac|ancestral|justiciar|bandos|armadyl)/.test(n)) return "Armor & Gear";
  if (/(amulet|ring|necklace|bracelet|gem|diamond|ruby|sapphire|emerald|onyx|zenyte|glory|fury|anguish|torture|occult)/.test(n)) return "Gems & Jewelry";
  if (/(potion|brew|restore|herb|weed|seed|guam|marrentill|tarromin|harralander|ranarr|toadflax|irit|avantoe|kwuarm|snapdragon|cadantine|lantadyme|dwarf weed|torstol|vial|dust)/.test(n)) return "Herblore & Seeds";
  if (/(raw|cooked|fish|shark|manta|karambwan|anglerfish|food|pie|cake|potato|stew|pizza|meat)/.test(n)) return "Food & Fishing";
  if (/(bar|ore|coal|mithril|adamant|runite|gold|silver|copper|tin)/.test(n)) return "Bars & Ores";
  if (/(log|plank|tree|teak|mahogany|yew|magic|dart tip|arrowtips)/.test(n)) return "Wood & Fletching";
  if (/(rune|talisman|tiara)/.test(n) && !n.includes("rune plate") && !n.includes("rune sword")) return "Runes & Magic";
  if (/(bone|hide|leather|scale|feather|ashes|ensouled)/.test(n)) return "Monster Drops";
  return "Miscellaneous";
}

// --- OPTIMIZED WATCHLIST RENDERER (ALL ITEMS) ---
function renderWatchlist() {
  const container = $("#watchlistContent");
  container.innerHTML = "";
  
  // Filter by game mode
  let activeItems = membersOn ? mapping : mapping.filter(m => !m.members);
  $("#wlCount").textContent = `${activeItems.length} Items`;

  // Sort groups systematically
  const categories = {
    "Weapons & Ammo": [], "Armor & Gear": [], "Gems & Jewelry": [], "Runes & Magic": [],
    "Herblore & Seeds": [], "Food & Fishing": [], "Bars & Ores": [], 
    "Wood & Fletching": [], "Monster Drops": [], "Miscellaneous": []
  };

  activeItems.forEach(item => {
    const c = classifyItem(item.name);
    if(categories[c]) categories[c].push(item);
  });

  // Use Document Fragment for hyper-fast DOM insertion of 3800 items
  const fragment = document.createDocumentFragment();

  Object.keys(categories).forEach(cat => {
    const list = categories[cat];
    if(list.length === 0) return;

    // Sort heavily by price descending
    list.sort((a,b) => {
      const pA = latest?.data?.[String(a.id)]?.high ?? 0;
      const pB = latest?.data?.[String(b.id)]?.high ?? 0;
      return pB - pA;
    });

    const groupDiv = document.createElement("div");
    groupDiv.className = "category-group";

    const titleDiv = document.createElement("div");
    titleDiv.className = "category-title";
    // Collapse Miscellaneous by default to save scroll space
    const isMisc = cat === "Miscellaneous";
    titleDiv.innerHTML = `<span>${cat}</span><span>${isMisc ? "▶" : "▼"}</span>`;
    
    const listDiv = document.createElement("div");
    listDiv.className = `category-list ${isMisc ? "collapsed" : ""}`;

    titleDiv.onclick = () => {
      listDiv.classList.toggle("collapsed");
      titleDiv.querySelector("span:last-child").textContent = listDiv.classList.contains("collapsed") ? "▶" : "▼";
    };

    let innerListHTML = "";
    list.forEach(item => {
      const node = latest?.data?.[String(item.id)];
      const price = node?.high ?? node?.avgHighPrice ?? node?.low ?? 0;
      
      // Calculate Trend Arrow against 24h baseline
      let trendHtml = "";
      if (past24h && past24h.data && past24h.data[String(item.id)]) {
        const pastHigh = past24h.data[String(item.id)].avgHighPrice || 0;
        if (price > pastHigh && pastHigh > 0) trendHtml = `<span class="wl-trend up">▲</span>`;
        else if (price < pastHigh && price > 0) trendHtml = `<span class="wl-trend down">▼</span>`;
      }

      const activeClass = selected?.id === item.id ? 'active' : '';
      
      innerListHTML += `
        <div class="wl-item ${activeClass}" data-id="${item.id}">
          <div class="wl-item-left">
            <img src="${bigIconUrl(item.name)}" alt="" loading="lazy">
            <span class="wl-item-name">${item.name}</span>
          </div>
          <div class="wl-item-right">
            <span class="wl-item-price">${abbreviateNumber(price)}</span>
            ${trendHtml}
          </div>
        </div>
      `;
    });

    listDiv.innerHTML = innerListHTML;
    groupDiv.appendChild(titleDiv);
    groupDiv.appendChild(listDiv);
    fragment.appendChild(groupDiv);
  });

  container.appendChild(fragment);

  // Delegate click events efficiently
  container.querySelectorAll('.wl-item').forEach(el => {
    el.onclick = () => {
      const id = el.getAttribute('data-id');
      const m = mapping.find(x => String(x.id) === String(id));
      if(m) setItem(m);
    };
  });
}

function seriesFromTS(ts) {
  const src = ts?.data || [];
  const rows = src.map(r => ({
    t: Number(r.timestamp ?? r.ts ?? r.time),
    lo: r.avgLowPrice ?? r.low ?? null,
    hi: r.avgHighPrice ?? r.high ?? null,
    lowVol: r.lowPriceVolume ?? 0,
    highVol: r.highPriceVolume ?? 0
  })).filter(r => r.t && (r.lo != null || r.hi != null)).sort((a, b) => a.t - b.t);
  return { labels: rows.map(r => r.t), low: rows.map(r => r.lo), high: rows.map(r => r.hi), lowVol: rows.map(r => r.lowVol), highVol: rows.map(r => r.highVol) };
}

function seriesFromHistorical(h) {
  const src = h?.[String(selected.id)] || [];
  const rows = src.map(r => ({
    t: Number(r.timestamp / 1000),
    lo: r.price,
    hi: r.price,
    lowVol: r.volume ?? 0,
    highVol: 0
  })).filter(r => r.t && r.lo != null).sort((a, b) => a.t - b.t);
  return { labels: rows.map(r => r.t), low: rows.map(r => r.lo), high: rows.map(r => r.hi), lowVol: rows.map(r => r.lowVol), highVol: rows.map(r => r.highVol) };
}

function getPeriod(view) {
  const p = {"1d": 86400, "5d": 432000, "1m": 2592000, "6m": 15552000, "1y": 31536000, "5y": 157680000};
  return p[view] || Infinity;
}

function filterSeries(series, period) {
  const minT = Math.max(...series.labels) - period;
  const startIdx = series.labels.findIndex(t => t >= minT);
  return {
    labels: series.labels.slice(startIdx), low: series.low.slice(startIdx), high: series.high.slice(startIdx),
    lowVol: series.lowVol.slice(startIdx), highVol: series.highVol.slice(startIdx)
  };
}

async function calculateAllPctChanges(id) {
  const changes = {};
  const historical = await loadHistorical(id);
  fullHistorical = seriesFromHistorical(historical);
  const periods = ['1d', '5d', '1m', '6m', '1y', '5y'];
  
  for (const p of periods) {
    let ser;
    if (p === '1d' || p === '5d') ser = seriesFromTS(await loadTS('1h', id));
    else if (p === '1m') ser = seriesFromTS(await loadTS('6h', id));
    else if (p === '6m') ser = seriesFromTS(await loadTS('24h', id));
    else ser = fullHistorical;
    
    const filtered = filterSeries(ser, getPeriod(p));
    let firstMid = null, lastMid = null;
    for (let i = 0; i < filtered.labels.length; i++) {
      const l = filtered.low[i], h = filtered.high[i];
      if (l != null || h != null) {
        const mid = ((l ?? h) + (h ?? l)) / 2;
        if (firstMid == null) firstMid = mid;
        lastMid = mid;
      }
    }
    if (firstMid == null || lastMid == null) { changes[p] = '0.00%'; } 
    else { changes[p] = (((lastMid - firstMid) / firstMid) * 100).toFixed(2) + '%'; }
  }
  return changes;
}

function ypx(v, vmin, vmax, y0, h) {
  if (vmin === vmax) return y0 + h / 2;
  return y0 + (1 - ((v - vmin) / (vmax - vmin))) * h;
}

function linearRegression(x, y) {
  const n = x.length;
  let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
  for (let i = 0; i < n; i++) {
    sumX += x[i]; sumY += y[i]; sumXY += x[i] * y[i]; sumX2 += x[i] * x[i];
  }
  const denominator = (n * sumX2 - sumX * sumX);
  if (denominator === 0) return { slope: 0, intercept: sumY / n };
  const slope = (n * sumXY - sumX * sumY) / denominator;
  const intercept = (sumY - slope * sumX) / n;
  return { slope, intercept };
}

function percentile(arr, p) {
  if (!arr.length) return null;
  const sorted = [...arr].sort((a, b) => a - b);
  const index = (p / 100) * (sorted.length - 1);
  const lower = Math.floor(index);
  const upper = Math.ceil(index);
  const weight = index - lower;
  return sorted[lower] * (1 - weight) + sorted[upper] * weight;
}

function calculateIQR(series, window = 26) {
  const mid = series.labels.map((_, i) => {
    if (series.low[i] != null && series.high[i] != null) return (series.low[i] + series.high[i]) / 2;
    return series.low[i] ?? series.high[i] ?? null;
  });
  const lowIQR = Array(mid.length).fill(null), highIQR = Array(mid.length).fill(null);
  for (let i = window - 1; i < mid.length; i++) {
    const w = mid.slice(i - window + 1, i + 1).filter(v => v != null).sort((a, b) => a - b);
    if (w.length < Math.floor(window / 2)) continue;
    const p25 = w[Math.floor(0.25 * (w.length - 1))], p75 = w[Math.floor(0.75 * (w.length - 1))];
    lowIQR[i] = p25; highIQR[i] = p75;
  }
  return { lowIQR, highIQR };
}

function calculateTax(price) {
  return Math.min(5000000, Math.floor(price * 0.02));
}

function runTradeEngine(rawLow, rawHigh, series) {
  if (!rawLow || !rawHigh) return { buy: rawLow || 0, sell: rawHigh || 0 };

  let recBuy = rawLow;
  let recSell = rawHigh;

  if (rawHigh - rawLow > 2) recBuy = rawLow + 1; 

  if (series && series.high.length > 0) {
    const recentHighs = series.high.slice(-40).filter(x => x != null);
    if (recentHighs.length > 5) {
      const p75High = Math.ceil(percentile(recentHighs, 75));
      if (rawHigh > p75High * 1.02) recSell = p75High;
      else recSell = Math.min(rawHigh - 1, p75High);
    } else {
      recSell = rawHigh - 1;
    }
  } else {
    recSell = rawHigh - 1;
  }

  let tax = calculateTax(recSell);
  let profit = recSell - recBuy - tax;

  if (profit <= 0) {
    let safeTargetFloor = Math.ceil((recBuy * 1.015) / 0.98);
    if (safeTargetFloor * 0.02 >= 5000000) {
      safeTargetFloor = Math.ceil(recBuy + 5000000 + (recBuy * 0.01));
    }
    if (series && series.high.length > 0) {
      const p90High = Math.ceil(percentile(series.high.slice(-40).filter(x => x != null), 90));
      if (p90High > safeTargetFloor) safeTargetFloor = Math.min(safeTargetFloor, p90High);
    }
    recSell = safeTargetFloor;
  }

  if (recBuy >= recSell) recBuy = Math.floor(recSell * 0.96); 
  return { buy: recBuy, sell: recSell };
}

function drawChart(series) {
  const c = canvas;
  const W = c.width, H = c.height;
  const x0 = 45, y0 = 60, w = W - x0 - 15, h = H - y0 - 20;
  ctx.clearRect(0, 0, W, H);
  
  if (!series || !series.labels?.length) { 
    ctx.fillStyle = "var(--text-muted)"; ctx.font = "bold 12px sans-serif";
    ctx.fillText("No price metrics available", W/2 - 60, H/2); return; 
  }

  const n = series.labels.length;
  const win = Math.max(20, Math.floor(n / zoom));
  offset = Math.max(0, Math.min(n - win, offset));
  const start = offset, end = start + win;
  
  const L = series.labels.slice(start, end);
  const LO = series.low.slice(start, end), HI = series.high.slice(start, end);
  const LOWVOL = series.lowVol.slice(start, end), HIGHVOL = series.highVol.slice(start, end);
  const VO = LOWVOL.map((lv, i) => lv + HIGHVOL[i]);
  const vals = [...LO, ...HI].filter(v => v != null);
  
  if (!vals.length) return;
  let vmin = Math.min(...vals), vmax = Math.max(...vals);
  if (vmin === vmax) { vmin -= 1; vmax += 1; }
  const buffer = (vmax - vmin) * 0.05; vmin -= buffer; vmax += buffer;

  const dataW = w * 0.85; 
  const futureW = w * 0.15; 
  const stepX = dataW / Math.max(1, (L.length - 1));

  ctx.lineWidth = 1;
  const linesY = 5;
  ctx.font = "10px BlinkMacSystemFont, sans-serif";
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for (let i = 0; i <= linesY; i++) {
    const y = y0 + (h * i / linesY);
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x0 + w, y); ctx.stroke();
    const v = Math.round(vmax - (vmax - vmin) * i / linesY);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim();
    ctx.fillText(abbreviateNumber(v), x0 - 6, y);
  }

  const linesX = Math.min(6, L.length);
  const xStep = Math.floor(L.length / linesX);
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  for (let i = 0; i < L.length; i += xStep) {
    const x = x0 + i * stepX;
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.beginPath(); ctx.moveTo(x, y0); ctx.lineTo(x, y0 + h); ctx.stroke();
    let dateStr = view === "1d" ? new Date(L[i]*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : new Date(L[i]*1000).toLocaleDateString([],{month:'short', day:'numeric'});
    ctx.fillText(dateStr, x, y0 + h + 4);
  }

  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.setLineDash([2, 4]);
  ctx.beginPath(); ctx.moveTo(x0 + dataW, y0); ctx.lineTo(x0 + dataW, y0 + h); ctx.stroke();
  ctx.setLineDash([]);

  const h_price = h * 0.80, h_vol = h * 0.20, y0_vol = y0 + h_price;

  const iqr = calculateIQR({low: LO, high: HI, labels: L});
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--iqr-band').trim();
  ctx.beginPath();
  let firstValid = -1;
  for (let i = 0; i < L.length; i++) {
    if (iqr.highIQR[i] != null && iqr.lowIQR[i] != null) {
      const x = x0 + i * stepX, y = ypx(iqr.highIQR[i], vmin, vmax, y0, h_price);
      if (firstValid === -1) { ctx.moveTo(x, y); firstValid = i; } else ctx.lineTo(x, y);
    }
  }
  if (firstValid !== -1) {
    for (let i = L.length - 1; i >= firstValid; i--) {
      if (iqr.lowIQR[i] != null) ctx.lineTo(x0 + i * stepX, ypx(iqr.lowIQR[i], vmin, vmax, y0, h_price));
    }
    ctx.closePath(); ctx.fill();
  }

  function drawDashes(arr, color) {
    ctx.fillStyle = color;
    const dashWidth = Math.max(3, stepX * 1.4); 
    const dashHeight = 2; 
    for (let i = 0; i < arr.length; i++) {
      if (arr[i] == null) continue;
      const x = x0 + i * stepX;
      const y = ypx(arr[i], vmin, vmax, y0, h_price);
      ctx.fillRect(x - dashWidth/2, y - dashHeight/2, dashWidth, dashHeight);
    }
  }
  
  drawDashes(LO, getComputedStyle(document.documentElement).getPropertyValue('--buy-color').trim());
  drawDashes(HI, getComputedStyle(document.documentElement).getPropertyValue('--sell-color').trim());

  const maxVol = Math.max(...VO.filter(v => v > 0), 1);
  const volBuyColor = getComputedStyle(document.documentElement).getPropertyValue('--vol-buy').trim();
  const volSellColor = getComputedStyle(document.documentElement).getPropertyValue('--vol-sell').trim();
  const barWidth = Math.max(1, stepX * 0.8); 
  
  for (let i = 0; i < VO.length; i++) {
    if (LOWVOL[i] == null && HIGHVOL[i] == null) continue;
    const totalH = ((LOWVOL[i] + HIGHVOL[i]) / maxVol) * h_vol;
    const lowH = (LOWVOL[i] / maxVol) * h_vol;
    const x = x0 + i * stepX - (barWidth / 2);
    
    ctx.fillStyle = volBuyColor;
    ctx.fillRect(x, y0_vol + h_vol - totalH, barWidth, totalH);
    ctx.fillStyle = volSellColor;
    ctx.fillRect(x, y0_vol + h_vol - totalH + lowH, barWidth, totalH - lowH);
  }

  function drawTrailingPrediction(arr, color) {
    const nonNull = arr.map((v, i) => ({v, i})).filter(({v}) => v != null);
    if (nonNull.length < 5) return;
    
    const lookback = Math.max(5, Math.floor(nonNull.length * 0.25));
    const recent = nonNull.slice(-lookback);
    const { slope, intercept } = linearRegression(recent.map(n=>n.i), recent.map(n=>n.v));
    const lastPt = nonNull[nonNull.length - 1];
    
    const startX = x0 + lastPt.i * stepX;
    const startY = ypx(lastPt.v, vmin, vmax, y0, h_price);
    
    const projectedI = (L.length - 1) + (futureW / stepX);
    const projectedV = slope * projectedI + intercept;
    const endX = x0 + dataW + futureW;
    const endY = ypx(projectedV, vmin, vmax, y0, h_price);
    
    ctx.save();
    ctx.beginPath(); ctx.rect(x0, y0, w, h); ctx.clip(); 
    ctx.setLineDash([2, 4]); ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
    ctx.restore();
  }
  drawTrailingPrediction(LO, getComputedStyle(document.documentElement).getPropertyValue('--buy-color').trim());
  drawTrailingPrediction(HI, getComputedStyle(document.documentElement).getPropertyValue('--sell-color').trim());

  const activePrice = activePriceBox === 'buy' ? recommendedBuy : recommendedSell;
  if (activePrice != null) {
    const py = ypx(activePrice, vmin, vmax, y0, h_price);
    if (py >= y0 && py <= y0 + h_price) {
      ctx.save();
      ctx.setLineDash([3, 3]);
      ctx.strokeStyle = "rgba(255, 255, 255, 0.85)";
      ctx.lineWidth = 1.0;
      ctx.beginPath(); ctx.moveTo(x0, py); ctx.lineTo(x0 + w, py); ctx.stroke();
      
      ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
      ctx.font = "9px BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      ctx.fillText("Active Target", x0 + 4, py - 3);
      ctx.restore();
    }
  }

  let isDragging = false, startXMouse = 0;
  
  c.ontouchstart = ev => { 
    if(ev.touches.length === 1) { isDragging = true; startXMouse = ev.touches[0].clientX; } 
  };
  c.ontouchend = () => isDragging = false;
  c.ontouchmove = ev => {
    if (isDragging && ev.touches.length === 1) {
      const dx = ev.touches[0].clientX - startXMouse; startXMouse = ev.touches[0].clientX;
      offset -= dx / (dataW / win);
      offset = Math.max(0, Math.min(n - win, offset));
      requestAnimationFrame(() => drawChart(series));
      return;
    }
  };

  c.onmousedown = ev => { isDragging = true; startXMouse = ev.clientX; };
  c.onmouseup = () => isDragging = false;
  c.onmouseleave = () => { isDragging = false; tip.style.display = "none"; };
  c.onmousemove = ev => {
    const rect = c.getBoundingClientRect();
    const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    if (isDragging) {
      const dx = ev.clientX - startXMouse; startXMouse = ev.clientX;
      offset -= dx / (dataW / win);
      offset = Math.max(0, Math.min(n - win, offset));
      requestAnimationFrame(() => drawChart(series));
      return;
    }
    if (mx < x0 || mx > x0 + dataW || my < y0 || my > H) { tip.style.display = "none"; return; }
    const idx = Math.max(0, Math.min(L.length - 1, Math.round((mx - x0) / stepX)));
    tip.style.display = "block";
    tip.style.left = (mx + 10) + "px";
    tip.style.top = (my + 10) + "px";
    
    let hLow = LO[idx]; let hHigh = HI[idx];
    let hTax = calculateTax(hHigh || 0);
    let hProf = (hHigh && hLow) ? (hHigh - hLow - hTax) : 0;
    let profHtml = hProf > 0 ? `<span style="color:var(--positive)">+${fmtNum(hProf)}</span>` : `<span style="color:var(--negative)">${fmtNum(hProf)}</span>`;

    tip.innerHTML = `<strong>${new Date(L[idx]*1000).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</strong>
      <span style="color:var(--buy-color)">Buy: ${fmtGp(hLow)}</span><br/>
      <span style="color:var(--sell-color)">Sell: ${fmtGp(hHigh)}</span><br/>
      <span style="color:var(--text-muted)">Profit: ${profHtml}</span>`;
  };
  c.onwheel = ev => {
    ev.preventDefault();
    zoom = Math.max(1, Math.min(10, zoom * (ev.deltaY < 0 ? 1.2 : 0.8)));
    requestAnimationFrame(() => drawChart(series));
  };
}

async function setItem(m) {
  selected = m;
  $("#query").value = m.name;
  document.title = `${m.name} - TradingView Engine`;
  $("#itemIcon").src = bigIconUrl(m.name);
  $("#status").textContent = "Loading...";

  // Ensure active state updates in sidebar
  renderWatchlist();

  // Populate timeframe % change labels
  const changes = await calculateAllPctChanges(m.id);
  document.querySelectorAll(".view-btn").forEach(b => {
    const p = b.dataset.view;
    const val = parseFloat(changes[p]);
    const cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral';
    const prefix = val > 0 ? '+' : '';
    b.innerHTML = `${p.toUpperCase()}<span class="pct-chg ${cls}">${prefix}${changes[p]}</span>`;
  });

  let timestep = "24h";
  if (view === "1d" || view === "5d") timestep = "5m"; 
  else if (view === "1m") timestep = "1h"; 
  else if (view === "6m") timestep = "6h";

  if (view === "5y") {
    currentSeries = filterSeries(fullHistorical, getPeriod(view));
  } else {
    currentSeries = filterSeries(seriesFromTS(await loadTS(timestep, m.id)), getPeriod(view));
  }
  
  latest = await loadLatest();
  const node = latest.data[String(m.id)];
  const rawLow = node?.low ?? node?.avgLowPrice ?? 0;
  const rawHigh = node?.high ?? node?.avgHighPrice ?? 0;
  
  const targets = runTradeEngine(rawLow, rawHigh, currentSeries);
  recommendedBuy = targets.buy;
  recommendedSell = targets.sell;
  
  $("#buyPrice .price-val span").textContent = fmtGp(recommendedBuy);
  $("#sellPrice .price-val span").textContent = fmtGp(recommendedSell);

  offset = Math.max(0, currentSeries.labels.length - Math.floor(currentSeries.labels.length / zoom));
  resizeCanvas(); 
  $("#status").textContent = "Active";
}

(async function boot() {
  try {
    mapping = await loadMapping();
    latest = await loadLatest();
    
    // Fetch 24h data to generate baseline for up/down trend arrows
    try { past24h = await load24h(); } catch(e) { console.warn("Could not fetch 24h baseline."); }
    
    renderWatchlist();

    const sb = $("#suggestBox"), qInput = $("#query");
    
    qInput.addEventListener("input", () => {
      const q = qInput.value.trim().toLowerCase();
      if (!q) { sb.style.display = "none"; sb.innerHTML = ""; return; }
      const list = mapping.filter(x => x.name.toLowerCase().includes(q) && (membersOn || !x.members)).slice(0, 40);
      sb.innerHTML = list.map(x => `<div data-id="${x.id}"><img src="${bigIconUrl(x.name)}">${x.name}</div>`).join("");
      sb.style.display = list.length ? "block" : "none";
    });
    
    sb.addEventListener("click", e => {
      const id = e.target.closest('div')?.dataset?.id;
      if (!id) return;
      const m = mapping.find(x => String(x.id) === String(id));
      if (m) { 
        sb.style.display = "none"; 
        qInput.blur(); 
        setItem(m); 
      }
    });
    
    document.addEventListener("click", e => { if(e.target !== qInput) sb.style.display="none"; });
    qInput.addEventListener("focus", () => { if(qInput.value) qInput.dispatchEvent(new Event('input')); });

    document.querySelectorAll(".view-btn").forEach(b => {
      b.onclick = () => {
        document.querySelectorAll(".view-btn").forEach(x => x.classList.remove("active"));
        b.classList.add("active"); view = b.dataset.view;
        zoom = 1.0; 
        if (selected) setItem(selected);
      }
    });
    
    $("#btnF2P").onclick = () => { 
      membersOn = false; 
      $("#btnF2P").classList.add("active"); $("#btnMembers").classList.remove("active"); 
      renderWatchlist();
      qInput.dispatchEvent(new Event("input")); 
      if (selected && selected.members) {
        const ruby = mapping.find(x => x.name.toLowerCase() === "ruby");
        if(ruby) setItem(ruby);
      }
    };

    $("#btnMembers").onclick = () => { 
      membersOn = true; 
      $("#btnMembers").classList.add("active"); $("#btnF2P").classList.remove("active"); 
      renderWatchlist();
      qInput.dispatchEvent(new Event("input")); 
    };
    
    setInterval(async () => { 
      latest = await loadLatest();
      renderWatchlist(); 
      if (selected) setItem(selected); 
    }, 300000);
    
    resizeCanvas();
    const ruby = mapping.find(x => x.name.toLowerCase() === "ruby");
    if (ruby) setItem(ruby);
  } catch (e) {
    console.error(e);
    $("#status").textContent = "API Error";
  }
})();
</script>
