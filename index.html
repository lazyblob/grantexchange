    context.strokeStyle = '#00ff00';
    context.lineWidth = 1;

  const labelStep = Math.floor(L.length / (numLabels - 1)) || 1;
  for (let i = 0; i < L.length; i += labelStep) {
    let dateStr;
    if (view === "1d") {

    } else {
